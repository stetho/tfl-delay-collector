services:
  tfl-delay-collector:
    image: registry.stetho.me/tfl-delay-collector:latest
    container_name: tfl-delay-collector
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"      
    environment:      
      TFL_API_KEY: ${TFL_API_KEY}
      RTT_USER: ${RTT_USER}
      RTT_PASS: ${RTT_PASS}
      DB_PATH: /data/delays.db
    volumes:
      - /data/tfl-delay-data:/data


